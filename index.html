<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Cloud Pro Max 2.0</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0b1220,#111827);
    color:white;
}

/* LOGIN */
.login{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    padding:20px;
    border-radius:16px;
    width:320px;
}

input,select,button{
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:10px;
    border:none;
}

button{
    background:#1e88e5;
    color:white;
    cursor:pointer;
}

/* HEADER */
header{
    background:#1e88e5;
    padding:15px;
    text-align:center;
}

/* DASHBOARD */
.dashboard{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    padding:10px;
}

.box{
    background:#111827;
    padding:15px;
    border-radius:12px;
    text-align:center;
}

/* INPUTS */
.inputs{
    padding:10px;
}

/* FEED */
.feed{
    padding:10px;
}

.item{
    background:#111827;
    padding:12px;
    margin-bottom:10px;
    border-radius:12px;
    display:flex;
    justify-content:space-between;
}

.receita{color:#22c55e;font-weight:bold;}
.despesa{color:#ef4444;font-weight:bold;}

.small{
    font-size:12px;
    color:#94a3b8;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginBox">
<div class="card">
<h3>💙 Login Finance Cloud</h3>

<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>
<button onclick="register()">Criar conta</button>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<header>
<h2>💙 Finance Cloud Pro Max</h2>
<button onclick="logout()">Sair</button>
</header>

<!-- DASH -->
<div class="dashboard">
<div class="box"><h4>Saldo</h4><h2 id="saldo">R$ 0,00</h2></div>
<div class="box"><h4>Receitas</h4><h2 id="receitas">R$ 0,00</h2></div>
<div class="box"><h4>Despesas</h4><h2 id="despesas">R$ 0,00</h2></div>
</div>

<!-- INPUTS -->
<div class="inputs">
<input id="desc" placeholder="Descrição">

<select id="cat">
<option>Alimentação</option>
<option>Transporte</option>
<option>Lazer</option>
<option>Saúde</option>
</select>

<select id="tipo">
<option value="receita">Receita</option>
<option value="despesa">Despesa</option>
</select>

<input id="valor" type="number" placeholder="Valor">

<button onclick="add()">Adicionar</button>
</div>

<canvas id="chart"></canvas>

<div class="feed" id="feed"></div>

</div>

<script>

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "SUA_API",
  authDomain: "SEU_AUTH",
  projectId: "SEU_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* ELEMENTOS */
const email = document.getElementById("email");
const pass = document.getElementById("pass");
const desc = document.getElementById("desc");
const cat = document.getElementById("cat");
const tipo = document.getElementById("tipo");
const valor = document.getElementById("valor");

const feed = document.getElementById("feed");
const saldoEl = document.getElementById("saldo");
const receitasEl = document.getElementById("receitas");
const despesasEl = document.getElementById("despesas");

const chartCanvas = document.getElementById("chart");

let user = null;
let dados = [];
let chart;

/* LOGIN */
function login(){
auth.signInWithEmailAndPassword(email.value, pass.value)
.catch(e=>alert(e.message));
}

function register(){
auth.createUserWithEmailAndPassword(email.value, pass.value)
.catch(e=>alert(e.message));
}

function logout(){
auth.signOut();
}

/* AUTH */
auth.onAuthStateChanged(async u=>{
if(u){
user=u;
loginBox.style.display="none";
app.style.display="block";
load();
}else{
loginBox.style.display="flex";
app.style.display="none";
}
});

/* ADD */
async function add(){

if(!desc.value || !valor.value) return;

await db.collection("users")
.doc(user.uid)
.collection("finance")
.add({
desc:desc.value,
cat:cat.value,
tipo:tipo.value,
valor:Number(valor.value),
date:new Date().toISOString()
});

desc.value="";
valor.value="";

load();
}

/* LOAD */
async function load(){

const snap=await db.collection("users")
.doc(user.uid)
.collection("finance")
.get();

dados=snap.docs.map(d=>({id:d.id,...d.data()}));

render();
}

/* DELETE */
async function remove(id){

await db.collection("users")
.doc(user.uid)
.collection("finance")
.doc(id)
.delete();

load();
}

/* FORMAT */
const format=v=>v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});

/* RENDER */
function render(){

let r=0,d=0;
let map={};

let html="";

dados.forEach(x=>{

const v=x.valor;

if(x.tipo==="receita") r+=v;
else d+=v;

map[x.cat]=(map[x.cat]||0)+v;

html+=`
<div class="item">
<div>
<b>${x.desc}</b><br>
<span class="small">${x.cat}</span>
<button onclick="remove('${x.id}')">🗑</button>
</div>
<div class="${x.tipo}">
${x.tipo==="receita"?"+":"-"} ${format(v)}
</div>
</div>`;
});

feed.innerHTML=html;

saldoEl.innerText=format(r-d);
receitasEl.innerText=format(r);
despesasEl.innerText=format(d);

if(chart) chart.destroy();

chart=new Chart(chartCanvas,{
type:"doughnut",
data:{
labels:Object.keys(map),
datasets:[{
data:Object.values(map),
backgroundColor:["#1e88e5","#22c55e","#ef4444","#facc15"]
}]
}
});
}

</script>

</body>
</html>
