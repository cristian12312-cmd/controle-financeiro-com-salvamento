<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance App Ultra</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f4f7fb;
}

.dark{
    background:#0f172a;
    color:white;
}

.header{
    background:linear-gradient(90deg,#1e88e5,#2563eb);
    color:white;
    padding:25px;
    text-align:center;
    border-radius:0 0 25px 25px;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

/* CARDS */
.cards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-top:-20px;
}

.card{
    background:white;
    padding:15px;
    border-radius:14px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    text-align:center;
}

.dark .card{background:#1e293b;color:white;}

.card h3{margin:0;font-size:13px;color:#666;}
.card p{font-size:20px;font-weight:bold;margin:5px 0 0;}

/* INPUTS */
input,select,button{
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:1px solid #ddd;
}

button{
    background:#1e88e5;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{opacity:0.9;}

.top{
    margin-top:15px;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    background:white;
    border-radius:10px;
    overflow:hidden;
}

.dark table{background:#1e293b;}

th,td{
    padding:10px;
    border-bottom:1px solid #eee;
}

.receita{color:green;font-weight:bold;}
.despesa{color:red;font-weight:bold;}

canvas{
    margin-top:20px;
    background:white;
    border-radius:10px;
    padding:10px;
}

.dark canvas{background:#1e293b;}

.badge{
    padding:5px 10px;
    border-radius:10px;
    background:#1e88e5;
    color:white;
    font-size:12px;
}
</style>
</head>

<body>

<div class="header">
<h1>💙 Finance App Ultra</h1>
<p>Controle financeiro estilo fintech</p>
<button onclick="toggleDark()">🌙 Modo</button>
</div>

<div class="container">

<!-- DASHBOARD -->
<div class="cards">
<div class="card"><h3>Receitas</h3><p id="receitas">0</p></div>
<div class="card"><h3>Despesas</h3><p id="despesas">0</p></div>
<div class="card"><h3>Saldo</h3><p id="saldo">0</p></div>
<div class="card"><h3>Meta</h3><p id="meta">0</p></div>
</div>

<!-- INPUTS -->
<div class="top">
<input id="desc" placeholder="Descrição">

<select id="cat">
<option>Alimentação</option>
<option>Transporte</option>
<option>Lazer</option>
<option>Saúde</option>
<option>Outros</option>
</select>

<select id="tipo">
<option value="receita">Receita</option>
<option value="despesa">Despesa</option>
</select>

<input id="valor" type="number" placeholder="Valor">

<button onclick="add()">Adicionar</button>
<button onclick="limpar()">Limpar</button>
<button onclick="exportar()">Exportar</button>
</div>

<!-- META -->
<div class="top">
<input id="metaInput" type="number" placeholder="Definir meta mensal">
<button onclick="setMeta()">Definir Meta</button>
</div>

<!-- FILTER -->
<div class="top">
<input id="busca" placeholder="Buscar..." oninput="render()">

<select id="filtro" onchange="render()">
<option value="todos">Todos</option>
<option value="receita">Receitas</option>
<option value="despesa">Despesas</option>
</select>
</div>

<!-- CHART -->
<canvas id="chart"></canvas>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>Data</th>
<th>Descrição</th>
<th>Categoria</th>
<th>Tipo</th>
<th>Valor</th>
<th>Ação</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</div>

<script>

let dados = JSON.parse(localStorage.getItem("financeUltra")) || [];
let meta = Number(localStorage.getItem("meta")) || 0;

function salvar(){
    localStorage.setItem("financeUltra", JSON.stringify(dados));
    localStorage.setItem("meta", meta);
}

function toggleDark(){
    document.body.classList.toggle("dark");
}

function setMeta(){
    meta = Number(metaInput.value);
    salvar();
    render();
}

function add(){

    if(!desc.value || !valor.value) return;

    dados.push({
        desc:desc.value,
        cat:cat.value,
        tipo:tipo.value,
        valor:Number(valor.value),
        data:new Date().toLocaleDateString()
    });

    salvar();
    render();

    desc.value="";
    valor.value="";
}

function limpar(){
    if(confirm("Apagar tudo?")){
        dados=[];
        salvar();
        render();
    }
}

function exportar(){
    const blob = new Blob([JSON.stringify(dados)],{type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "finance.json";
    a.click();
}

function remover(i){
    dados.splice(i,1);
    salvar();
    render();
}

let chart;

function render(){

    let r=0,d=0,catMap={};
    const busca = document.getElementById("busca").value.toLowerCase();
    const filtro = document.getElementById("filtro").value;

    lista.innerHTML="";

    dados.forEach((x,i)=>{

        if(busca && !x.desc.toLowerCase().includes(busca)) return;
        if(filtro !== "todos" && x.tipo !== filtro) return;

        if(x.tipo==="receita") r+=x.valor;
        else d+=x.valor;

        catMap[x.cat]=(catMap[x.cat]||0)+x.valor;

        lista.innerHTML+=`
        <tr>
            <td>${x.data}</td>
            <td>${x.desc}</td>
            <td><span class="badge">${x.cat}</span></td>
            <td class="${x.tipo}">${x.tipo}</td>
            <td>R$ ${x.valor.toFixed(2)}</td>
            <td><button onclick="remover(${i})">❌</button></td>
        </tr>`;
    });

    receitas.innerText=r.toFixed(2);
    despesas.innerText=d.toFixed(2);
    saldo.innerText=(r-d).toFixed(2);
    meta.innerText=meta?meta.toFixed(2):"0";

    if(chart) chart.destroy();

    chart=new Chart(chartCanvas,{
        type:"doughnut",
        data:{
            labels:Object.keys(catMap),
            datasets:[{
                data:Object.values(catMap),
                backgroundColor:["#1e88e5","#00c853","#ff5252","#ffca28","#8e44ad"]
            }]
        }
    });
}

const chartCanvas=document.getElementById("chart");

render();

</script>

</body>
</html>
