<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Feed Pro Max</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

.header{
    background:#1e88e5;
    padding:20px;
    text-align:center;
}

.top{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
    padding:10px;
}

.box{
    background:#111827;
    padding:15px;
    border-radius:12px;
    text-align:center;
}

.input{
    padding:10px;
}

input,select{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:8px;
    border:none;
    outline:none;
}

button{
    width:100%;
    padding:10px;
    background:#1e88e5;
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
}

.feed{
    padding:10px;
}

.item{
    background:#111827;
    padding:15px;
    border-radius:12px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
}

.cat{
    font-size:11px;
    color:#94a3b8;
}

.receita{color:#22c55e;font-weight:bold;}
.despesa{color:#ef4444;font-weight:bold;}

.del{
    background:#ef4444;
    padding:5px 10px;
    border-radius:6px;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<h2>💙 Finance Feed Pro Max</h2>
</div>

<div class="top">
<div class="box"><h4>SALDO</h4><h2 id="saldo">R$ 0,00</h2></div>
<div class="box"><h4>ENTRADA</h4><h2 id="r">R$ 0,00</h2></div>
<div class="box"><h4>SAÍDA</h4><h2 id="d">R$ 0,00</h2></div>
</div>

<div class="input">
<input id="desc" placeholder="Descrição">

<select id="cat">
<option>Alimentação</option>
<option>Transporte</option>
<option>Lazer</option>
<option>Saúde</option>
</select>

<select id="tipo">
<option value="receita">Receita</option>
<option value="despesa">Despesa</option>
</select>

<input id="valor" type="number" placeholder="Valor">

<button onclick="add()">Adicionar</button>
</div>

<canvas id="chart"></canvas>

<div class="feed" id="feed"></div>

<script>

const desc = document.getElementById("desc");
const cat = document.getElementById("cat");
const tipo = document.getElementById("tipo");
const valor = document.getElementById("valor");
const feed = document.getElementById("feed");
const chartCanvas = document.getElementById("chart");

let dados = JSON.parse(localStorage.getItem("feed_finance")) || [];
let chart;

const format = (v) =>
    v.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });

const colors = [
    "#1e88e5", "#22c55e", "#ef4444", "#facc15",
    "#a855f7", "#06b6d4", "#f97316", "#10b981"
];

function save(){
    localStorage.setItem("feed_finance", JSON.stringify(dados));
}

function add(){

    if(!desc.value || !valor.value){
        alert("Preencha todos os campos");
        return;
    }

    dados.unshift({
        id: Date.now(),
        desc: desc.value,
        cat: cat.value,
        tipo: tipo.value,
        valor: Number(valor.value),
        data: new Date().toLocaleDateString()
    });

    save();
    render();

    desc.value = "";
    valor.value = "";
    cat.value = "Alimentação";
    tipo.value = "receita";
}

function remove(id){
    if(!confirm("Deseja remover este item?")) return;
    dados = dados.filter(i => i.id !== id);
    save();
    render();
}

function render(){

    let r = 0;
    let d = 0;
    let map = {};

    if(dados.length === 0){
        feed.innerHTML = "<p style='text-align:center;color:#94a3b8'>Nenhum lançamento ainda</p>";
        document.getElementById("r").innerText = "R$ 0,00";
        document.getElementById("d").innerText = "R$ 0,00";
        document.getElementById("saldo").innerText = "R$ 0,00";
        if(chart) chart.destroy();
        return;
    }

    let html = "";

    dados.forEach(x => {

        const val = Number(x.valor);

        if(x.tipo === "receita") r += val;
        else d += val;

        map[x.cat] = (map[x.cat] || 0) + val;

        html += `
        <div class="item">
            <div>
                <strong>${x.desc}</strong><br>
                <span class="cat">${x.cat} • ${x.data}</span><br>
                <button class="del" onclick="remove(${x.id})">remover</button>
            </div>

            <div class="${x.tipo}">
                ${x.tipo === "receita" ? "+" : "-"} ${format(val)}
            </div>
        </div>`;
    });

    feed.innerHTML = html;

    const saldo = r - d;

    document.getElementById("r").innerText = format(r);
    document.getElementById("d").innerText = format(d);
    document.getElementById("saldo").innerText = format(saldo);

    if(chart) chart.destroy();

    const entries = Object.entries(map).sort((a,b)=>b[1]-a[1]);
    const labels = entries.map(e => e[0]);
    const values = entries.map(e => e[1]);

    chart = new Chart(chartCanvas, {
        type: "doughnut",
        data: {
            labels,
            datasets: [{
                data: values,
                backgroundColor: labels.map((_, i) => colors[i % colors.length])
            }]
        }
    });
}

render();

</script>

</body>
</html>
