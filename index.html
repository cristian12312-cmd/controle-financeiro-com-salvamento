<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Cloud Pro Max 2.0</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0b1220,#111827);
    color:white;
}

/* LOGIN */
.login{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    padding:20px;
    border-radius:16px;
    width:320px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

input,select,button{
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:10px;
    border:none;
    outline:none;
}

button{
    background:#1e88e5;
    color:white;
    cursor:pointer;
    transition:0.2s;
}
button:hover{transform:scale(1.03);}

/* HEADER */
header{
    background:rgba(30,136,229,0.9);
    padding:15px;
    text-align:center;
}

/* DASHBOARD */
.dashboard{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    padding:10px;
}

.cardBox{
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:12px;
    text-align:center;
    backdrop-filter:blur(10px);
    transition:0.2s;
}
.cardBox:hover{transform:scale(1.03);}

/* INPUT AREA */
.inputs{
    padding:10px;
}

/* FEED */
.feed{
    padding:10px;
}

.item{
    background:rgba(255,255,255,0.05);
    margin-bottom:10px;
    padding:12px;
    border-radius:12px;
    display:flex;
    justify-content:space-between;
    backdrop-filter:blur(8px);
}

.receita{color:#22c55e;font-weight:bold;}
.despesa{color:#ef4444;font-weight:bold;}

.small{
    font-size:12px;
    color:#94a3b8;
}

/* FILTER */
.filters{
    display:flex;
    gap:10px;
    padding:10px;
}

.filters input{
    flex:1;
}

/* ANIMATION */
.fade{
    animation:fadeIn 0.3s ease-in;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginBox">
<div class="card">
<h2>💙 Finance Cloud</h2>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
<button onclick="register()">Criar conta</button>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<header>
<h2>💙 Finance Cloud Pro Max 2.0</h2>
<button onclick="logout()">Sair</button>
</header>

<!-- DASHBOARD -->
<div class="dashboard">
<div class="cardBox">
<h4>Saldo</h4>
<h2 id="saldo">0</h2>
</div>

<div class="cardBox">
<h4>Receitas</h4>
<h2 id="receitas">0</h2>
</div>

<div class="cardBox">
<h4>Despesas</h4>
<h2 id="despesas">0</h2>
</div>
</div>

<!-- FILTERS -->
<div class="filters">
<input id="search" placeholder="Buscar..." oninput="render()">

<select id="month" onchange="render()">
<option value="">Todos meses</option>
<option>01</option><option>02</option><option>03</option>
<option>04</option><option>05</option><option>06</option>
<option>07</option><option>08</option><option>09</option>
<option>10</option><option>11</option><option>12</option>
</select>
</div>

<!-- INPUTS -->
<div class="inputs">
<input id="desc" placeholder="Descrição">

<select id="cat">
<option>Alimentação</option>
<option>Transporte</option>
<option>Lazer</option>
<option>Saúde</option>
</select>

<select id="tipo">
<option value="receita">Receita</option>
<option value="despesa">Despesa</option>
</select>

<input id="valor" type="number" placeholder="Valor">

<button onclick="add()">Adicionar</button>
</div>

<canvas id="chart1"></canvas>
<canvas id="chart2"></canvas>

<div class="feed" id="feed"></div>

</div>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "SUA_API",
  authDomain: "SEU_AUTH",
  projectId: "SEU_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let user=null;
let dados=[];

/* LOGIN */
function login(){
auth.signInWithEmailAndPassword(email.value,pass.value);
}

function register(){
auth.createUserWithEmailAndPassword(email.value,pass.value);
}

function logout(){
auth.signOut();
}

/* AUTH */
auth.onAuthStateChanged(async u=>{
if(u){
user=u;
loginBox.style.display="none";
app.style.display="block";
load();
}else{
loginBox.style.display="flex";
app.style.display="none";
}
});

/* ADD */
async function add(){
if(!desc.value||!valor.value) return;

await db.collection("users")
.doc(user.uid)
.collection("fin")
.add({
desc:desc.value,
cat:cat.value,
tipo:tipo.value,
valor:Number(valor.value),
date:new Date().toISOString()
});

desc.value="";
valor.value="";

load();
}

/* LOAD */
async function load(){
const snap=await db.collection("users")
.doc(user.uid)
.collection("fin")
.get();

dados=snap.docs.map(d=>({id:d.id,...d.data()}));

render();
}

/* DELETE */
async function remove(id){
await db.collection("users")
.doc(user.uid)
.collection("fin")
.doc(id)
.delete();

load();
}

/* FORMAT */
const format=v=>v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});

/* RENDER */
let chart1,chart2;

function render(){

let r=0,d=0;
let catMap={};

let filtered=[...dados];

/* SEARCH */
if(search.value){
filtered=filtered.filter(x=>
x.desc.toLowerCase().includes(search.value.toLowerCase())
);
}

/* MONTH FILTER */
if(month.value){
filtered=filtered.filter(x=>
new Date(x.date).getMonth()+1==month.value
);
}

let html="";

filtered.forEach(x=>{

const v=x.valor;

if(x.tipo==="receita")r+=v;
else d+=v;

catMap[x.cat]=(catMap[x.cat]||0)+v;

html+=`
<div class="item fade">
<div>
<b>${x.desc}</b><br>
<span class="small">${x.cat}</span>
<button onclick="remove('${x.id}')">🗑</button>
</div>
<div class="${x.tipo}">
${x.tipo==="receita"?"+":"-"} ${format(v)}
</div>
</div>`;
});

feed.innerHTML=html;

/* DASH */
saldo.innerText=format(r-d);
receitas.innerText=format(r);
despesas.innerText=format(d);

/* CHART 1 */
if(chart1)chart1.destroy();

chart1=new Chart(chart1Canvas,{
type:"doughnut",
data:{
labels:Object.keys(catMap),
datasets:[{
data:Object.values(catMap),
backgroundColor:["#1e88e5","#22c55e","#ef4444","#facc15","#a855f7"]
}]
}
});

/* CHART 2 */
if(chart2)chart2.destroy();

chart2=new Chart(chart2Canvas,{
type:"bar",
data:{
labels:["Receitas","Despesas"],
datasets:[{
data:[r,d],
backgroundColor:["#22c55e","#ef4444"]
}]
}
});
}

</script>

</body>
</html>
