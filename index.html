<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance App</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#f2f2f7;
}

/* HEADER */
.header{
    background:#820ad1;
    color:white;
    padding:25px;
    border-radius:0 0 25px 25px;
}

/* CONTAINER */
.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* CARDS */
.cards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-top:-30px;
}

.card{
    background:white;
    padding:15px;
    border-radius:14px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
    transition:0.2s;
}

.card:hover{
    transform:translateY(-3px);
}

.card h3{
    margin:0;
    font-size:13px;
    color:#666;
}

.card p{
    font-size:22px;
    font-weight:bold;
    margin:5px 0 0;
}

/* BOTÃO FLUTUANTE */
.fab{
    position:fixed;
    bottom:20px;
    right:20px;
    width:60px;
    height:60px;
    border-radius:50%;
    background:#820ad1;
    color:white;
    font-size:30px;
    border:none;
    cursor:pointer;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:20px;
    border-radius:15px;
    width:90%;
    max-width:400px;
}

input,select,button{
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:1px solid #ddd;
    width:100%;
}

button{
    background:#820ad1;
    color:white;
    border:none;
    cursor:pointer;
}

/* LISTA */
.table{
    margin-top:20px;
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    border-bottom:1px solid #eee;
}

.receita{color:green;font-weight:bold;}
.despesa{color:red;font-weight:bold;}

/* ANIMAÇÃO */
.fade{
    animation:fade 0.3s ease;
}

@keyframes fade{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="header">
<h2>Olá 👋</h2>
<h1>Seu Financeiro</h1>
</div>

<div class="container">

<!-- CARDS -->
<div class="cards">
<div class="card">
<h3>Receitas</h3>
<p id="receitas">0</p>
</div>

<div class="card">
<h3>Despesas</h3>
<p id="despesas">0</p>
</div>

<div class="card">
<h3>Saldo</h3>
<p id="saldo">0</p>
</div>
</div>

<canvas id="grafico"></canvas>

<div class="table">
<table>
<thead>
<tr>
<th>Data</th>
<th>Descrição</th>
<th>Categoria</th>
<th>Tipo</th>
<th>Valor</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>
</div>

</div>

<!-- BOTÃO FLUTUANTE -->
<button class="fab" onclick="openModal()">+</button>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<h3>Adicionar lançamento</h3>

<input id="desc" placeholder="Descrição">

<select id="categoria">
<option>Alimentação</option>
<option>Transporte</option>
<option>Lazer</option>
<option>Outros</option>
</select>

<select id="tipo">
<option value="receita">Receita</option>
<option value="despesa">Despesa</option>
</select>

<input id="valor" type="number" placeholder="Valor">

<button onclick="add()">Salvar</button>
<button onclick="closeModal()">Fechar</button>

</div>
</div>

<script>

let dados = JSON.parse(localStorage.getItem("financeiro")) || [];

function save(){
    localStorage.setItem("financeiro", JSON.stringify(dados));
}

function openModal(){
    document.getElementById("modal").style.display="flex";
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

function add(){

    const desc = document.getElementById("desc").value;
    const cat = document.getElementById("categoria").value;
    const tipo = document.getElementById("tipo").value;
    const valor = parseFloat(document.getElementById("valor").value);

    if(!desc || isNaN(valor)) return;

    dados.push({
        desc,
        cat,
        tipo,
        valor,
        data:new Date().toLocaleDateString()
    });

    save();
    render();
    closeModal();
}

function render(){

    let receitas=0;
    let despesas=0;
    let catMap={};

    const lista=document.getElementById("lista");
    lista.innerHTML="";

    dados.forEach(d=>{

        if(d.tipo==="receita") receitas+=d.valor;
        else despesas+=d.valor;

        catMap[d.cat]=(catMap[d.cat]||0)+d.valor;

        lista.innerHTML+=`
        <tr class="fade">
            <td>${d.data}</td>
            <td>${d.desc}</td>
            <td>${d.cat}</td>
            <td class="${d.tipo}">${d.tipo}</td>
            <td>R$ ${d.valor.toFixed(2)}</td>
        </tr>`;
    });

    document.getElementById("receitas").innerText=receitas.toFixed(2);
    document.getElementById("despesas").innerText=despesas.toFixed(2);
    document.getElementById("saldo").innerText=(receitas-despesas).toFixed(2);

    const ctx=document.getElementById("grafico");

    if(window.chart) window.chart.destroy();

    window.chart=new Chart(ctx,{
        type:"doughnut",
        data:{
            labels:Object.keys(catMap),
            datasets:[{
                data:Object.values(catMap),
                backgroundColor:["#820ad1","#ff6384","#36a2eb","#ffcd56"]
            }]
        }
    });
}

render();

</script>

</body>
</html>
