<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Financeiro</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width: 1000px;
    margin: 20px auto;
    padding: 20px;
}

input, select, button{
    padding: 8px;
    margin: 4px;
}

table{
    width:100%;
    border-collapse: collapse;
    margin-top:20px;
}

th, td{
    border:1px solid #ccc;
    padding:10px;
    text-align:left;
}

.receita{
    color:green;
    font-weight:bold;
}

.despesa{
    color:red;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>💰 Controle Financeiro</h1>

<input id="desc" placeholder="Descrição">

<select id="categoria">
    <option>Alimentação</option>
    <option>Transporte</option>
    <option>Lazer</option>
    <option>Moradia</option>
    <option>Saúde</option>
    <option>Outros</option>
</select>

<select id="tipo">
    <option value="receita">Receita</option>
    <option value="despesa">Despesa</option>
</select>

<input id="valor" type="number" step="0.01" placeholder="Valor">

<button onclick="add()">Adicionar</button>
<button onclick="limpar()">Limpar Tudo</button>

<br><br>

<input id="busca" placeholder="Pesquisar lançamento..." onkeyup="render()">

<h2>Receitas: R$ <span id="receitas">0.00</span></h2>
<h2>Despesas: R$ <span id="despesas">0.00</span></h2>
<h2>Saldo: R$ <span id="saldo">0.00</span></h2>

<table>
<thead>
<tr>
<th>Data</th>
<th>Descrição</th>
<th>Categoria</th>
<th>Tipo</th>
<th>Valor</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="lista"></tbody>
</table>

<script>
let dados = JSON.parse(localStorage.getItem("financeiro")) || [];

function salvar(){
    localStorage.setItem("financeiro", JSON.stringify(dados));
}

function render(){

    const busca = document.getElementById("busca").value.toLowerCase();
    const lista = document.getElementById("lista");

    lista.innerHTML = "";

    let receitas = 0;
    let despesas = 0;

    dados.forEach((item,index)=>{

        if(!item.desc.toLowerCase().includes(busca)){
            return;
        }

        if(item.tipo === "receita"){
            receitas += item.valor;
        }else{
            despesas += item.valor;
        }

        lista.innerHTML += `
        <tr>
            <td>${item.data}</td>
            <td>${item.desc}</td>
            <td>${item.categoria}</td>
            <td>${item.tipo}</td>
            <td class="${item.tipo}">
                R$ ${item.valor.toFixed(2)}
            </td>
            <td>
                <button onclick="remover(${index})">❌</button>
            </td>
        </tr>`;
    });

    document.getElementById("receitas").innerText = receitas.toFixed(2);
    document.getElementById("despesas").innerText = despesas.toFixed(2);
    document.getElementById("saldo").innerText = (receitas - despesas).toFixed(2);
}

function add(){

    const desc = document.getElementById("desc").value;
    const categoria = document.getElementById("categoria").value;
    const tipo = document.getElementById("tipo").value;
    const valor = parseFloat(document.getElementById("valor").value);

    if(!desc || isNaN(valor)) return;

    dados.push({
        desc,
        categoria,
        tipo,
        valor,
        data: new Date().toLocaleDateString("pt-BR")
    });

    salvar();
    render();

    document.getElementById("desc").value = "";
    document.getElementById("valor").value = "";
}

function remover(index){
    dados.splice(index,1);
    salvar();
    render();
}

function limpar(){
    if(confirm("Deseja apagar todos os lançamentos?")){
        dados = [];
        salvar();
        render();
    }
}

render();
</script>

</body>
</html>
