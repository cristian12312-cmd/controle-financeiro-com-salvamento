<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Financeiro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial;
    max-width: 1000px;
    margin: 20px auto;
    padding: 20px;
    background: #fff;
    color: #000;
    transition: 0.3s;
}

.dark{
    background:#121212;
    color:#fff;
}

input, select, button{
    padding:8px;
    margin:4px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    border:1px solid #ccc;
    padding:8px;
}

.receita{color:green;font-weight:bold;}
.despesa{color:red;font-weight:bold;}

.progress{
    width:100%;
    background:#ddd;
    height:20px;
    margin-top:10px;
}

.bar{
    height:20px;
    background:green;
    width:0%;
}
</style>
</head>

<body>

<h1>💰 Controle Financeiro</h1>

<button onclick="toggleDark()">🌙 Modo Escuro</button>
<button onclick="exportCSV()">📥 Exportar CSV</button>

<br><br>

Meta: <input id="meta" type="number" placeholder="Ex: 5000">
<button onclick="setMeta()">Salvar Meta</button>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<br>

<input id="desc" placeholder="Descrição">

<select id="categoria">
<option>Alimentação</option>
<option>Transporte</option>
<option>Lazer</option>
<option>Moradia</option>
<option>Saúde</option>
<option>Outros</option>
</select>

<select id="tipo">
<option value="receita">Receita</option>
<option value="despesa">Despesa</option>
</select>

<input id="valor" type="number" placeholder="Valor">

<button onclick="add()">Adicionar</button>
<button onclick="clearAll()">Limpar Tudo</button>

<br><br>

<input id="search" placeholder="Pesquisar..." onkeyup="render()">

<input type="month" id="month" onchange="render()">

<h2>Receitas: R$ <span id="receitas">0</span></h2>
<h2>Despesas: R$ <span id="despesas">0</span></h2>
<h2>Saldo: R$ <span id="saldo">0</span></h2>

<canvas id="chart"></canvas>

<table>
<thead>
<tr>
<th>Data</th>
<th>Descrição</th>
<th>Categoria</th>
<th>Tipo</th>
<th>Valor</th>
<th>Ação</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

<script>

let data = JSON.parse(localStorage.getItem("financeiro")) || [];
let meta = parseFloat(localStorage.getItem("meta")) || 0;

function save(){
    localStorage.setItem("financeiro", JSON.stringify(data));
}

function setMeta(){
    meta = parseFloat(document.getElementById("meta").value);
    localStorage.setItem("meta", meta);
    render();
}

function toggleDark(){
    document.body.classList.toggle("dark");
}

function add(){

    const desc = document.getElementById("desc").value;
    const cat = document.getElementById("categoria").value;
    const type = document.getElementById("tipo").value;
    const value = parseFloat(document.getElementById("valor").value);

    if(!desc || isNaN(value)) return;

    data.push({
        desc,
        cat,
        type,
        value,
        date: new Date().toISOString()
    });

    save();
    render();
}

function remove(i){
    data.splice(i,1);
    save();
    render();
}

function clearAll(){
    if(confirm("Apagar tudo?")){
        data = [];
        save();
        render();
    }
}

function exportCSV(){

    let csv = "Data,Descricao,Categoria,Tipo,Valor\n";

    data.forEach(d=>{
        csv += `${d.date},${d.desc},${d.cat},${d.type},${d.value}\n`;
    });

    const blob = new Blob([csv], {type:"text/csv"});
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "financeiro.csv";
    a.click();
}

let chart;

function render(){

    const search = document.getElementById("search").value.toLowerCase();
    const month = document.getElementById("month").value;

    let income = 0;
    let expense = 0;
    let categories = {};

    const list = document.getElementById("lista");
    list.innerHTML = "";

    data.forEach((d,i)=>{

        const date = new Date(d.date);
        const ym = d.date.slice(0,7);

        if(month && ym !== month) return;
        if(!d.desc.toLowerCase().includes(search)) return;

        if(d.type === "receita") income += d.value;
        else expense += d.value;

        categories[d.cat] = (categories[d.cat] || 0) + d.value;

        list.innerHTML += `
        <tr>
            <td>${date.toLocaleDateString()}</td>
            <td>${d.desc}</td>
            <td>${d.cat}</td>
            <td>${d.type}</td>
            <td>${d.value.toFixed(2)}</td>
            <td><button onclick="remove(${i})">❌</button></td>
        </tr>`;
    });

    document.getElementById("receitas").innerText = income.toFixed(2);
    document.getElementById("despesas").innerText = expense.toFixed(2);
    document.getElementById("saldo").innerText = (income-expense).toFixed(2);

    if(meta > 0){
        let percent = ((income-expense)/meta)*100;
        document.getElementById("bar").style.width = percent + "%";
    }

    const ctx = document.getElementById("chart");

    if(chart) chart.destroy();

    chart = new Chart(ctx,{
        type:"pie",
        data:{
            labels:Object.keys(categories),
            datasets:[{
                data:Object.values(categories)
            }]
        }
    });
}

render();

</script>

</body>
</html>
