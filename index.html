<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Cloud Pro Max</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

header{
    background:#1e88e5;
    padding:20px;
    text-align:center;
}

.container{
    max-width:900px;
    margin:auto;
    padding:10px;
}

.login-box{
    display:flex;
    height:100vh;
    justify-content:center;
    align-items:center;
}

.card{
    background:#111827;
    padding:20px;
    border-radius:12px;
    width:320px;
}

input,select,button{
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:8px;
    border:none;
}

button{
    background:#1e88e5;
    color:white;
    cursor:pointer;
}

.top{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
    margin-top:10px;
}

.box{
    background:#111827;
    padding:15px;
    border-radius:12px;
    text-align:center;
}

.feed{
    margin-top:10px;
}

.item{
    background:#111827;
    padding:15px;
    border-radius:12px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
}

.receita{color:#22c55e;font-weight:bold;}
.despesa{color:#ef4444;font-weight:bold;}

.del{
    background:#ef4444;
    border:none;
    padding:5px 10px;
    border-radius:6px;
    cursor:pointer;
    margin-top:5px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
<div class="card">
<h3>💙 Finance Cloud Login</h3>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>
<button onclick="register()">Criar conta</button>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<header>
<h2>💙 Finance Cloud Pro Max</h2>
<button onclick="logout()">Sair</button>
</header>

<div class="container">

<div class="top">
<div class="box">
<h4>SALDO</h4>
<h2 id="saldo">R$ 0,00</h2>
</div>

<div class="box">
<h4>ENTRADA</h4>
<h2 id="entrada">R$ 0,00</h2>
</div>

<div class="box">
<h4>SAÍDA</h4>
<h2 id="saida">R$ 0,00</h2>
</div>
</div>

<br>

<input id="desc" placeholder="Descrição">

<select id="cat">
<option>Alimentação</option>
<option>Transporte</option>
<option>Lazer</option>
<option>Saúde</option>
</select>

<select id="tipo">
<option value="receita">Receita</option>
<option value="despesa">Despesa</option>
</select>

<input id="valor" type="number" placeholder="Valor">

<button onclick="add()">Adicionar</button>

<canvas id="chart"></canvas>

<div class="feed" id="feed"></div>

</div>
</div>

<script>

// 🔥 FIREBASE CONFIG (COLOQUE O SEU AQUI)
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_AUTH_DOMAIN",
  projectId: "SEU_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let user = null;
let dados = [];
let chart;

const format = v =>
    v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});

// LOGIN
function login(){
    auth.signInWithEmailAndPassword(email.value,password.value);
}

function register(){
    auth.createUserWithEmailAndPassword(email.value,password.value);
}

function logout(){
    auth.signOut();
}

// AUTH STATE
auth.onAuthStateChanged(async u=>{
    if(u){
        user = u;
        loginBox.style.display="none";
        app.style.display="block";
        load();
    }else{
        loginBox.style.display="flex";
        app.style.display="none";
    }
});

// ADD
async function add(){

    if(!desc.value || !valor.value) return;

    await db.collection("users")
    .doc(user.uid)
    .collection("finance")
    .add({
        desc: desc.value,
        cat: cat.value,
        tipo: tipo.value,
        valor: Number(valor.value),
        data: new Date().toLocaleDateString()
    });

    desc.value="";
    valor.value="";

    load();
}

// DELETE
async function remove(id){
    await db.collection("users")
    .doc(user.uid)
    .collection("finance")
    .doc(id)
    .delete();

    load();
}

// LOAD
async function load(){

    const snap = await db.collection("users")
    .doc(user.uid)
    .collection("finance")
    .get();

    dados = snap.docs.map(d=>({id:d.id,...d.data()}));
    render();
}

// RENDER
function render(){

    let r=0,d=0,map={};

    let html="";

    dados.forEach(x=>{

        const v = Number(x.valor);

        if(x.tipo==="receita") r+=v;
        else d+=v;

        map[x.cat]=(map[x.cat]||0)+v;

        html+=`
        <div class="item">
            <div>
                <b>${x.desc}</b><br>
                <small>${x.cat} • ${x.data}</small><br>
                <button class="del" onclick="remove('${x.id}')">remover</button>
            </div>
            <div class="${x.tipo}">
                ${x.tipo==="receita"?"+":"-"} ${format(v)}
            </div>
        </div>`;
    });

    feed.innerHTML=html;

    saldo.innerText=format(r-d);
    entrada.innerText=format(r);
    saida.innerText=format(d);

    if(chart) chart.destroy();

    const labels = Object.keys(map);
    const values = Object.values(map);

    chart = new Chart(chartCanvas,{
        type:"doughnut",
        data:{
            labels,
            datasets:[{
                data:values,
                backgroundColor:[
                    "#1e88e5","#22c55e","#ef4444",
                    "#facc15","#a855f7","#06b6d4"
                ]
            }]
        }
    });
}

</script>

</body>
</html>
