<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance App Pro Max</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

/* LOGIN */
#login{
    display:flex;
    height:100vh;
    justify-content:center;
    align-items:center;
}

.box{
    background:#1e293b;
    padding:25px;
    border-radius:15px;
    width:300px;
    text-align:center;
}

input,select{
    width:90%;
    padding:10px;
    margin:8px;
    border-radius:8px;
    border:none;
}

button{
    padding:10px;
    width:95%;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#1e88e5;
    color:white;
    cursor:pointer;
}

/* APP */
#app{display:none;}

.header{
    background:linear-gradient(90deg,#1e88e5,#2563eb);
    padding:20px;
    text-align:center;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

/* CARDS */
.cards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

.card{
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    text-align:center;
}

.card h3{margin:0;font-size:13px;color:#94a3b8;}
.card p{font-size:20px;font-weight:bold;}

/* INPUT AREA */
.area{
    margin-top:15px;
}

/* TABLE */
table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

td,th{
    padding:10px;
    border-bottom:1px solid #334155;
}

.receita{color:#22c55e;}
.despesa{color:#ef4444;}

canvas{
    margin-top:20px;
    background:#1e293b;
    border-radius:10px;
    padding:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="box">
<h2>🔐 Login</h2>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="entrar()">Entrar</button>
</div>
</div>

<!-- APP -->
<div id="app">

<div class="header">
<h2>💙 Finance App Pro Max</h2>
</div>

<div class="container">

<!-- CARDS -->
<div class="cards">
<div class="card"><h3>Receitas</h3><p id="receitas">0</p></div>
<div class="card"><h3>Despesas</h3><p id="despesas">0</p></div>
<div class="card"><h3>Saldo</h3><p id="saldo">0</p></div>
</div>

<!-- INPUT -->
<div class="area">

<input id="desc" placeholder="Descrição">

<select id="cat">
<option>Alimentação</option>
<option>Transporte</option>
<option>Lazer</option>
<option>Saúde</option>
<option>Outros</option>
</select>

<select id="tipo">
<option value="receita">Receita</option>
<option value="despesa">Despesa</option>
</select>

<input id="valor" type="number" placeholder="Valor">

<button onclick="add()">Adicionar</button>
<button onclick="limpar()">Limpar Tudo</button>

</div>

<!-- FILTER -->
<div class="area">
<input id="busca" placeholder="Buscar..." oninput="render()">

<select id="filtro" onchange="render()">
<option value="todos">Todos</option>
<option value="receita">Receita</option>
<option value="despesa">Despesa</option>
</select>
</div>

<!-- CHART -->
<canvas id="chart"></canvas>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>Data</th>
<th>Descrição</th>
<th>Categoria</th>
<th>Tipo</th>
<th>Valor</th>
<th>Ação</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</div>
</div>

<script>

let dados = JSON.parse(localStorage.getItem("finance_pro")) || [];

function entrar(){
    if(user.value && pass.value){
        login.style.display="none";
        app.style.display="block";
        render();
    }
}

function salvar(){
    localStorage.setItem("finance_pro", JSON.stringify(dados));
}

function add(){

    if(!desc.value || !valor.value) return;

    dados.push({
        desc:desc.value,
        cat:cat.value,
        tipo:tipo.value,
        valor:Number(valor.value),
        data:new Date().toLocaleDateString()
    });

    salvar();
    render();

    desc.value="";
    valor.value="";
}

function remover(i){
    dados.splice(i,1);
    salvar();
    render();
}

function limpar(){
    if(confirm("Apagar tudo?")){
        dados=[];
        salvar();
        render();
    }
}

let chart;

function render(){

    let r=0,d=0;
    let catMap={};

    const busca = document.getElementById("busca").value.toLowerCase();
    const filtro = document.getElementById("filtro").value;

    lista.innerHTML="";

    dados.forEach((x,i)=>{

        if(busca && !x.desc.toLowerCase().includes(busca)) return;
        if(filtro!=="todos" && x.tipo!==filtro) return;

        if(x.tipo==="receita") r+=x.valor;
        else d+=x.valor;

        catMap[x.cat]=(catMap[x.cat]||0)+x.valor;

        lista.innerHTML+=`
        <tr>
            <td>${x.data}</td>
            <td>${x.desc}</td>
            <td>${x.cat}</td>
            <td class="${x.tipo}">${x.tipo}</td>
            <td>R$ ${x.valor.toFixed(2)}</td>
            <td><button onclick="remover(${i})">❌</button></td>
        </tr>`;
    });

    receitas.innerText=r.toFixed(2);
    despesas.innerText=d.toFixed(2);
    saldo.innerText=(r-d).toFixed(2);

    if(chart) chart.destroy();

    chart=new Chart(chartCanvas,{
        type:"doughnut",
        data:{
            labels:Object.keys(catMap),
            datasets:[{
                data:Object.values(catMap),
                backgroundColor:["#1e88e5","#22c55e","#ef4444","#facc15","#a855f7"]
            }]
        }
    });
}

const chartCanvas=document.getElementById("chart");

render();

</script>

</body>
</html>
