<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance App Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#f4f7fb;
}

.dark{
    background:#121212;
    color:white;
}

.header{
    background:#1e88e5;
    color:white;
    padding:25px;
    border-radius:0 0 25px 25px;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-top:-30px;
}

.card{
    background:white;
    padding:15px;
    border-radius:14px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.dark .card{background:#1e1e1e;}

.card h3{margin:0;font-size:13px;color:#666;}
.card p{font-size:22px;font-weight:bold;}

.fab{
    position:fixed;
    bottom:20px;
    right:20px;
    width:60px;
    height:60px;
    border-radius:50%;
    background:#1e88e5;
    color:white;
    font-size:30px;
    border:none;
    cursor:pointer;
}

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:20px;
    border-radius:15px;
    width:90%;
    max-width:400px;
}

.dark .modal-content{background:#1e1e1e;}

input,select,button{
    padding:10px;
    margin:5px;
    width:100%;
    border-radius:8px;
    border:1px solid #ddd;
}

button{
    background:#1e88e5;
    color:white;
    border:none;
    cursor:pointer;
}

.table{
    margin-top:20px;
    background:white;
    border-radius:15px;
    overflow:hidden;
}

.dark .table{background:#1e1e1e;}

table{width:100%;border-collapse:collapse;}
th,td{padding:10px;border-bottom:1px solid #eee;}

.receita{color:green;font-weight:bold;}
.despesa{color:red;font-weight:bold;}
</style>
</head>

<body>

<div class="header">
<h2>Olá 👋</h2>
<h1>Finance App Pro</h1>
<button onclick="toggleDark()">🌙 Modo</button>
</div>

<div class="container">

<div class="cards">
<div class="card"><h3>Receitas</h3><p id="receitas">0</p></div>
<div class="card"><h3>Despesas</h3><p id="despesas">0</p></div>
<div class="card"><h3>Saldo</h3><p id="saldo">0</p></div>
</div>

<canvas id="chart"></canvas>

<div class="table">
<table>
<thead>
<tr>
<th>Data</th>
<th>Descrição</th>
<th>Categoria</th>
<th>Tipo</th>
<th>Valor</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>
</div>

</div>

<button class="fab" onclick="openModal()">+</button>

<div class="modal" id="modal">
<div class="modal-content">

<h3>Novo lançamento</h3>

<input id="desc" placeholder="Descrição">

<select id="cat">
<option>Alimentação</option>
<option>Transporte</option>
<option>Lazer</option>
<option>Outros</option>
</select>

<select id="tipo">
<option value="receita">Receita</option>
<option value="despesa">Despesa</option>
</select>

<input id="valor" type="number" placeholder="Valor">

<button onclick="add()">Salvar</button>
<button onclick="closeModal()">Fechar</button>

</div>
</div>

<script>

let dados = JSON.parse(localStorage.getItem("finance")) || [];

function save(){
    localStorage.setItem("finance", JSON.stringify(dados));
}

function openModal(){modal.style.display="flex";}
function closeModal(){modal.style.display="none";}
function toggleDark(){document.body.classList.toggle("dark");}

function add(){

    if(!desc.value || !valor.value) return;

    dados.push({
        desc:desc.value,
        cat:cat.value,
        tipo:tipo.value,
        valor:Number(valor.value),
        data:new Date().toLocaleDateString()
    });

    save();
    render();
    closeModal();
}

function remove(i){
    dados.splice(i,1);
    save();
    render();
}

function render(){

    let r=0,d=0,catMap={};
    lista.innerHTML="";

    dados.forEach((x,i)=>{

        if(x.tipo==="receita") r+=x.valor;
        else d+=x.valor;

        catMap[x.cat]=(catMap[x.cat]||0)+x.valor;

        lista.innerHTML+=`
        <tr>
            <td>${x.data}</td>
            <td>${x.desc}</td>
            <td>${x.cat}</td>
            <td class="${x.tipo}">${x.tipo}</td>
            <td>R$ ${x.valor}</td>
            <td><button onclick="remove(${i})">🗑️</button></td>
        </tr>`;
    });

    receitas.innerText=r.toFixed(2);
    despesas.innerText=d.toFixed(2);
    saldo.innerText=(r-d).toFixed(2);

    if(window.chart) window.chart.destroy();

    window.chart=new Chart(chart,{
        type:"doughnut",
        data:{
            labels:Object.keys(catMap),
            datasets:[{
                data:Object.values(catMap),
                backgroundColor:["#1e88e5","#00c853","#ff5252","#ffca28"]
            }]
        }
    });
}

render();

</script>

</body>
</html>
