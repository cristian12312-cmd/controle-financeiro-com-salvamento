<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Feed</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

/* HEADER */
.header{
    padding:20px;
    background:#1e88e5;
    text-align:center;
}

/* DASH */
.dashboard{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
    padding:10px;
}

.box{
    background:#111827;
    padding:15px;
    border-radius:12px;
    text-align:center;
}

.box h3{margin:0;font-size:12px;color:#94a3b8;}
.box h2{margin:5px 0 0;}

/* INPUT */
.input{
    padding:10px;
}

input,select{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:8px;
    border:none;
}

button{
    width:100%;
    padding:10px;
    background:#1e88e5;
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
}

/* FEED */
.feed{
    padding:10px;
}

.card{
    background:#111827;
    padding:15px;
    border-radius:12px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.left{
    display:flex;
    flex-direction:column;
}

.cat{
    font-size:11px;
    color:#94a3b8;
}

.valor{
    font-weight:bold;
}

.receita{color:#22c55e;}
.despesa{color:#ef4444;}
</style>
</head>

<body>

<div class="header">
<h2>💙 Finance Feed</h2>
</div>

<div class="dashboard">
<div class="box"><h3>SALDO</h3><h2 id="saldo">0</h2></div>
<div class="box"><h3>ENTRADA</h3><h2 id="r">0</h2></div>
<div class="box"><h3>SAÍDA</h3><h2 id="d">0</h2></div>
</div>

<div class="input">

<input id="desc" placeholder="Descrição">

<select id="cat">
<option>Alimentação</option>
<option>Transporte</option>
<option>Lazer</option>
<option>Saúde</option>
</select>

<select id="tipo">
<option value="receita">Receita</option>
<option value="despesa">Despesa</option>
</select>

<input id="valor" type="number" placeholder="Valor">

<button onclick="add()">Adicionar</button>

</div>

<canvas id="chart"></canvas>

<div class="feed" id="feed"></div>

<script>

let dados = JSON.parse(localStorage.getItem("feed_finance")) || [];

function save(){
    localStorage.setItem("feed_finance", JSON.stringify(dados));
}

function add(){

    if(!desc.value || !valor.value) return;

    dados.unshift({
        desc:desc.value,
        cat:cat.value,
        tipo:tipo.value,
        valor:Number(valor.value),
        data:new Date().toLocaleDateString()
    });

    save();
    render();

    desc.value="";
    valor.value="";
}

function remove(i){
    dados.splice(i,1);
    save();
    render();
}

let chart;

function render(){

    let r=0,d=0;
    let map={};

    feed.innerHTML="";

    dados.forEach((x,i)=>{

        if(x.tipo==="receita") r+=x.valor;
        else d+=x.valor;

        map[x.cat]=(map[x.cat]||0)+x.valor;

        feed.innerHTML+=`
        <div class="card">
            <div class="left">
                <strong>${x.desc}</strong>
                <span class="cat">${x.cat} • ${x.data}</span>
            </div>

            <div style="text-align:right">
                <div class="${x.tipo}">R$ ${x.valor.toFixed(2)}</div>
                <button onclick="remove(${i})">x</button>
            </div>
        </div>`;
    });

    r.innerText=r.toFixed(2);
    d.innerText=d.toFixed(2);
    saldo.innerText=(r-d).toFixed(2);

    if(chart) chart.destroy();

    chart=new Chart(chartCanvas,{
        type:"doughnut",
        data:{
            labels:Object.keys(map),
            datasets:[{
                data:Object.values(map),
                backgroundColor:["#1e88e5","#22c55e","#ef4444","#facc15"]
            }]
        }
    });
}

const chartCanvas=document.getElementById("chart");

render();

</script>

</body>
</html>
