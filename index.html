<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank App</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

/* LOGIN */
#login{
    display:flex;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.login-box{
    background:#1e293b;
    padding:25px;
    border-radius:15px;
    width:300px;
    text-align:center;
}

input{
    width:90%;
    padding:10px;
    margin:8px;
    border-radius:8px;
    border:none;
}

button{
    padding:10px;
    width:95%;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#1e88e5;
    color:white;
    cursor:pointer;
}

/* APP */
#app{
    display:none;
}

.header{
    background:linear-gradient(90deg,#1e88e5,#2563eb);
    padding:20px;
    text-align:center;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* CARDS */
.cards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

.card{
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    text-align:center;
}

.card h3{margin:0;font-size:13px;color:#94a3b8;}
.card p{font-size:20px;font-weight:bold;margin:5px 0 0;}

/* NAV */
.nav{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    background:#1e293b;
    padding:10px;
}

.nav button{
    width:auto;
    background:none;
}

/* SECTIONS */
.section{display:none;}
.active{display:block;}

table{
    width:100%;
    margin-top:15px;
    border-collapse:collapse;
}

td,th{
    padding:10px;
    border-bottom:1px solid #334155;
}

.receita{color:#22c55e;}
.despesa{color:#ef4444;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="login-box">
<h2>🔐 Entrar</h2>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="entrar()">Entrar</button>
</div>
</div>

<!-- APP -->
<div id="app">

<div class="header">
<h2>💙 Meu Bank</h2>
</div>

<div class="container">

<!-- HOME -->
<div id="home" class="section active">

<div class="cards">
<div class="card"><h3>Saldo</h3><p id="saldo">0</p></div>
<div class="card"><h3>Receitas</h3><p id="receitas">0</p></div>
<div class="card"><h3>Despesas</h3><p id="despesas">0</p></div>
</div>

<canvas id="chart"></canvas>

</div>

<!-- TRANSACOES -->
<div id="transacoes" class="section">

<input id="desc" placeholder="Descrição">
<input id="valor" type="number" placeholder="Valor">

<select id="tipo">
<option value="receita">Receita</option>
<option value="despesa">Despesa</option>
</select>

<button onclick="add()">Adicionar</button>

<table>
<thead>
<tr>
<th>Descrição</th>
<th>Tipo</th>
<th>Valor</th>
<th></th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</div>

</div>

<!-- NAV -->
<div class="nav">
<button onclick="nav('home')">🏠</button>
<button onclick="nav('transacoes')">💰</button>
</div>

</div>

<script>

let dados = JSON.parse(localStorage.getItem("bank")) || [];

function entrar(){
    if(user.value && pass.value){
        login.style.display="none";
        app.style.display="block";
        render();
    }
}

function nav(id){
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function salvar(){
    localStorage.setItem("bank", JSON.stringify(dados));
}

function add(){

    if(!desc.value || !valor.value) return;

    dados.push({
        desc:desc.value,
        tipo:tipo.value,
        valor:Number(valor.value)
    });

    salvar();
    render();

    desc.value="";
    valor.value="";
}

function remover(i){
    dados.splice(i,1);
    salvar();
    render();
}

let chart;

function render(){

    let r=0,d=0;

    lista.innerHTML="";

    dados.forEach((x,i)=>{

        if(x.tipo==="receita") r+=x.valor;
        else d+=x.valor;

        lista.innerHTML+=`
        <tr>
            <td>${x.desc}</td>
            <td class="${x.tipo}">${x.tipo}</td>
            <td>R$ ${x.valor.toFixed(2)}</td>
            <td><button onclick="remover(${i})">❌</button></td>
        </tr>`;
    });

    receitas.innerText=r.toFixed(2);
    despesas.innerText=d.toFixed(2);
    saldo.innerText=(r-d).toFixed(2);

    if(chart) chart.destroy();

    chart=new Chart(chartCanvas,{
        type:"doughnut",
        data:{
            labels:["Receitas","Despesas"],
            datasets:[{
                data:[r,d],
                backgroundColor:["#22c55e","#ef4444"]
            }]
        }
    });
}

const chartCanvas=document.getElementById("chart");

render();

</script>

</body>
</html>
