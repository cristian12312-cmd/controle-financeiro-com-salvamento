<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance App</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#f4f4f8;
    color:#111;
}

.header{
    background:#820ad1;
    color:white;
    padding:20px;
    border-radius:0 0 20px 20px;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-top:-30px;
}

.card{
    background:white;
    padding:15px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.card h3{
    margin:0;
    font-size:14px;
    color:#666;
}

.card p{
    font-size:20px;
    margin:5px 0 0;
    font-weight:bold;
}

input,select,button{
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:1px solid #ddd;
}

button{
    background:#820ad1;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.table{
    width:100%;
    background:white;
    margin-top:20px;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    border-bottom:1px solid #eee;
    text-align:left;
}

.receita{color:green;font-weight:bold;}
.despesa{color:red;font-weight:bold;}

.top-actions{
    margin-top:15px;
}

canvas{
    margin-top:20px;
    background:white;
    border-radius:12px;
    padding:10px;
}
</style>
</head>

<body>

<div class="header">
<h2>Olá 👋</h2>
<h1>Seu financeiro</h1>
</div>

<div class="container">

<!-- CARDS -->
<div class="cards">
    <div class="card">
        <h3>Receitas</h3>
        <p id="receitas">0</p>
    </div>
    <div class="card">
        <h3>Despesas</h3>
        <p id="despesas">0</p>
    </div>
    <div class="card">
        <h3>Saldo</h3>
        <p id="saldo">0</p>
    </div>
</div>

<!-- INPUTS -->
<div class="top-actions">
<input id="desc" placeholder="Descrição">
<select id="categoria">
<option>Alimentação</option>
<option>Transporte</option>
<option>Lazer</option>
<option>Outros</option>
</select>

<select id="tipo">
<option value="receita">Receita</option>
<option value="despesa">Despesa</option>
</select>

<input id="valor" type="number" placeholder="Valor">
<button onclick="add()">Adicionar</button>
<button onclick="limpar()">Limpar</button>
</div>

<input id="busca" placeholder="Pesquisar..." onkeyup="render()">

<!-- GRAFICO -->
<canvas id="grafico"></canvas>

<!-- TABELA -->
<div class="table">
<table>
<thead>
<tr>
<th>Data</th>
<th>Descrição</th>
<th>Categoria</th>
<th>Tipo</th>
<th>Valor</th>
<th></th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>
</div>

</div>

<script>

let dados = JSON.parse(localStorage.getItem("financeiro")) || [];

function salvar(){
    localStorage.setItem("financeiro", JSON.stringify(dados));
}

function add(){

    const desc = document.getElementById("desc").value;
    const cat = document.getElementById("categoria").value;
    const tipo = document.getElementById("tipo").value;
    const valor = parseFloat(document.getElementById("valor").value);

    if(!desc || isNaN(valor)) return;

    dados.push({
        desc,
        cat,
        tipo,
        valor,
        data:new Date().toLocaleDateString()
    });

    salvar();
    render();
}

function limpar(){
    if(confirm("Apagar tudo?")){
        dados=[];
        salvar();
        render();
    }
}

function remover(i){
    dados.splice(i,1);
    salvar();
    render();
}

let chart;

function render(){

    const busca = document.getElementById("busca").value.toLowerCase();

    let receitas=0;
    let despesas=0;
    let catMap={};

    const lista=document.getElementById("lista");
    lista.innerHTML="";

    dados.forEach((d,i)=>{

        if(!d.desc.toLowerCase().includes(busca)) return;

        if(d.tipo==="receita") receitas+=d.valor;
        else despesas+=d.valor;

        catMap[d.cat]=(catMap[d.cat]||0)+d.valor;

        lista.innerHTML+=`
        <tr>
            <td>${d.data}</td>
            <td>${d.desc}</td>
            <td>${d.cat}</td>
            <td class="${d.tipo}">${d.tipo}</td>
            <td>R$ ${d.valor.toFixed(2)}</td>
            <td><button onclick="remover(${i})">X</button></td>
        </tr>`;
    });

    document.getElementById("receitas").innerText=receitas.toFixed(2);
    document.getElementById("despesas").innerText=despesas.toFixed(2);
    document.getElementById("saldo").innerText=(receitas-despesas).toFixed(2);

    const ctx=document.getElementById("grafico");

    if(chart) chart.destroy();

    chart=new Chart(ctx,{
        type:"doughnut",
        data:{
            labels:Object.keys(catMap),
            datasets:[{
                data:Object.values(catMap),
                backgroundColor:["#820ad1","#ff6384","#36a2eb","#ffcd56"]
            }]
        }
    });
}

render();

</script>

</body>
</html>
