<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Cloud Simple</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

/* LOGIN SIMPLES */
#login{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:#111827;
    padding:20px;
    border-radius:12px;
    width:300px;
}

input,button,select{
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:8px;
    border:none;
}

button{
    background:#1e88e5;
    color:white;
    cursor:pointer;
}

/* APP */
#app{display:none;}

.header{
    background:#1e88e5;
    padding:15px;
    text-align:center;
}

.top{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
    padding:10px;
}

.box{
    background:#111827;
    padding:15px;
    border-radius:12px;
    text-align:center;
}

.feed{
    padding:10px;
}

.item{
    background:#111827;
    padding:12px;
    margin-bottom:10px;
    border-radius:12px;
    display:flex;
    justify-content:space-between;
}

.receita{color:#22c55e;}
.despesa{color:#ef4444;}
</style>
</head>

<body>

<!-- LOGIN SIMPLES -->
<div id="login">
<div class="card">
<h3>💙 Entrar no sistema</h3>

<input id="name" placeholder="Seu nome">

<button onclick="enter()">Entrar</button>
</div>
</div>

<!-- APP -->
<div id="app">

<div class="header">
<h2 id="welcome"></h2>
</div>

<div class="top">
<div class="box"><h4>Saldo</h4><h2 id="saldo">0</h2></div>
<div class="box"><h4>Receitas</h4><h2 id="r">0</h2></div>
<div class="box"><h4>Despesas</h4><h2 id="d">0</h2></div>
</div>

<div style="padding:10px">

<input id="desc" placeholder="Descrição">

<select id="cat">
<option>Alimentação</option>
<option>Transporte</option>
<option>Lazer</option>
<option>Saúde</option>
</select>

<select id="tipo">
<option value="receita">Receita</option>
<option value="despesa">Despesa</option>
</select>

<input id="valor" type="number" placeholder="Valor">

<button onclick="add()">Adicionar</button>

</div>

<canvas id="chart"></canvas>

<div class="feed" id="feed"></div>

</div>

<script>

let dados = JSON.parse(localStorage.getItem("finance")) || [];
let chart;
let userName = "";

function enter(){
    const name = document.getElementById("name").value;

    if(!name){
        alert("Digite seu nome");
        return;
    }

    userName = name;

    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";

    document.getElementById("welcome").innerText = "Bem-vindo, " + name;

    render();
}

function save(){
    localStorage.setItem("finance", JSON.stringify(dados));
}

function add(){

    const desc = document.getElementById("desc");
    const cat = document.getElementById("cat");
    const tipo = document.getElementById("tipo");
    const valor = document.getElementById("valor");

    if(!desc.value || !valor.value) return;

    dados.unshift({
        id: Date.now(),
        desc: desc.value,
        cat: cat.value,
        tipo: tipo.value,
        valor: Number(valor.value),
        date: new Date().toLocaleDateString()
    });

    save();
    render();

    desc.value="";
    valor.value="";
}

function remove(id){
    dados = dados.filter(i => i.id !== id);
    save();
    render();
}

function render(){

    let r=0,d=0;
    let map={};

    let html="";

    dados.forEach(x=>{

        if(x.tipo==="receita") r+=x.valor;
        else d+=x.valor;

        map[x.cat]=(map[x.cat]||0)+x.valor;

        html+=`
        <div class="item">
        <div>
            <b>${x.desc}</b><br>
            <small>${x.cat}</small><br>
            <button onclick="remove(${x.id})">remover</button>
        </div>

        <div class="${x.tipo}">
            ${x.tipo==="receita"?"+":"-"} ${x.valor.toFixed(2)}
        </div>
        </div>`;
    });

    document.getElementById("feed").innerHTML = html;

    document.getElementById("r").innerText = r.toFixed(2);
    document.getElementById("d").innerText = d.toFixed(2);
    document.getElementById("saldo").innerText = (r-d).toFixed(2);

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"),{
        type:"doughnut",
        data:{
            labels:Object.keys(map),
            datasets:[{
                data:Object.values(map)
            }]
        }
    });
}

</script>

</body>
</html>
